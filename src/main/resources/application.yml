spring:
  application:
    name: demoAdmin
  config:
    import: optional:application-secret.yml
  datasource:
    url: jdbc:h2:mem:demo_admin;MODE=MySQL;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    access-token-expiration-seconds: 1800
