spring:
  application:
    name: demoAdmin
  config:
    import: optional:application-secret.yml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/demo_admin}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:demo_admin}
    password: ${DB_PASSWORD:demo_admin}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    access-token-expiration-seconds: 1800
